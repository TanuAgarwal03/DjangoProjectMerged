{% extends 'blog/base.html' %}

<h1>Login</h1>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button>
    <a href="{% url 'signup' %}">Don't have Account? Create one.</a>
</form>

{% block content %}
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <title>Login</title>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 w-100">
                <div class="card ">
                    <div class="card-body ">
                        <h2 class="text-center mb-4">Login</h2>
                        <form method="post" action="{% url 'blog:login' %}">
                            {% csrf_token %}
                            <div class="form-group mb-2">
                                <label for="{{ form.username.id_for_label }}">Username</label>
                                {{ form.username }}
                            </div>
                            <div class="form-group mt-2">
                                <label for="{{ form.password.id_for_label }}">Password</label>
                                {{ form.password }}
                            </div>
                            <button type="submit"
                                class="btn btn-primary btn-block mt-3 align-self-center w-100">Login</button>                                
                            </form>

                            <div class="p-2 fs-6 text-center">
                                <a class="text-decoration-none" href="{% url 'blog:post_list' %}">Continue without login</a>
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

{% endblock %}
